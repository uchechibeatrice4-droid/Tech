<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    nav{
        display: block;
        background-color: wheat;
        padding: 10px;
        border: 2px solid chocolate;
    }

    ul{
        list-style: none;
        margin: 10px;
        padding:3rem ;
    }

    li{
        display: inline-block;
        padding: 10px 20px;
        border: 2px solid salmon;
        color: aqua; 
        cursor: pointer;
    }


    li:hover{
        background-color: brown; 
    }

    .hide{
        display: none;
    }

    span{
        display: inline;
    }
</style>
<body>
    <nav>
        <ul>
            <li >Home</li>
            <li>About</li>
            <li>Courses</li>
            <li class="hide">Gallery</li>
            <li> Contacts</li>
        </ul>
    </nav>
</body>
</html>
